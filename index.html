<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stridex Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-container" id="productContainer"></div>

    <div id="galleryModal" class="modal">
        <div class="modal-content">
            <button class="back-btn" onclick="closeModal()">← Back</button>
            <h2 id="galleryTitle" style="margin-bottom: 20px;"></h2>
            <div id="galleryImages" class="gallery-grid"></div>
        </div>
    </div>
    <div id="lightboxModal" class="lightbox">
    <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
    <img class="lightbox-content" id="fullImage">
</div>

    <script src="script.js"></script>
</body>
</html>
